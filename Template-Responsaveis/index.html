<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./css/main.css">
    <title>Template Responsáveis</title>
</head>
<body>
    <div class="temp">
        <div class="header">
            <div class="div-img-ex">
                <img class="img-ex" src="./Images/ex.jpg"   alt="" >
            </div>
            <div class="div-img-min">
                <img class="img-min" src="./Images/min.jpg" alt="" ">
                <p style="font-size: 20px;">MINISTÉRIO DA DEFESA</p>
                <P>EXÉRCITO BRASILEIRO</P>
                <P>COMANDO DA 2° REGIÃO MILITAR</P> 
                <p>TIRO DE GUERRA 02-029 PIRAJUÍ</p>
            </div>
            <div class="div-img-2rm">
                <img class="img-2rm"  src="./Images/2rm.jpg"  alt="">
            </div>
        </div>
        <div class="secHeader-place">
            <input type="text" class="place-name" value="Area"/>
        </div>
        <div class="main">
            <div id="firstSection" class="firstSection">
                <div class="div-role">
                    <input value="tarefa" id="role1" type="text">
                </div>
                <div class="div-photo">
                    <img id="img-1" alt="Nomeie a foto como 01" src="./Monitores/01.jpg" >
                </div>
                <div class="div-name" >
                    <input value="nome" id="name1" type="text">
                </div>
            </div>
            <div id="secondSection" class="secondSection">
                <div class="div-role">
                    <input value="tarefa" id="role2" type="text">   
                </div>
                <div class="div-photo">
                    <img id="img-2" alt="Nomeie a foto como 02" src="./Monitores/02.jpg" >
                </div>
                <div class="div-name" >
                    <input value="nome" id="name2" type="text">
                </div>
            </div>
            <div id="div-img-tg" class="div-img-tg">
                <img src="./Images/tg.jpg"" alt="" >
            </div>
            <div id="thirdSection" class="thirdSection">
                <div class="div-role">
                    <input value="tarefa" id="role3" type="text" >
                </div>
                <div class="div-photo">
                    <img id="img-3" alt="Nomeie a foto como 03" src="./Monitores/03.jpg"  >
                </div>
                <div class="div-name">
                    <input value="nome" id="name3" type="text">
                </div>
            </div>
        </div>
    </div>
    <script src="./js/index.js"></script>
</body>

</html>
